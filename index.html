<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>అక్షర - మీ అడ్వాన్స్‌డ్ AI అసిస్టెంట్</title>
    
    <!-- PWA మొబైల్ సెట్టింగ్స్ -->
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="అక్షర AI">

    <!-- Web App Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"అక్షర AI అసిస్టెంట్","short_name":"అక్షర AI","start_url":".","display":"standalone","background_color":"#020617","theme_color":"#020617","icons":[{"src":"https://flaticon.com","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}' />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #020617; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; -webkit-font-smoothing: antialiased; }
        
        .ai-container { max-width: 440px; width: 100%; background-color: #0f172a; border: 1px solid #1e293b; border-radius: 24px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); display: flex; flex-direction: column; height: 650px; overflow: hidden; position: relative; }
        @media (max-width: 768px) { .ai-container { position: fixed; inset: 0; height: 100dvh; max-width: 100%; border-radius: 0; } }
        
        .header { background-color: rgba(30, 41, 59, 0.5); padding: 16px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(8px); }
        .profile-area { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; background: linear-gradient(to top right, #2563eb, #6366f1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background-color: #10b981; border: 2px solid #0f172a; border-radius: 50%; }
        .title { font-size: 18px; font-weight: bold; letter-spacing: 0.5px; }
        .status { font-size: 12px; color: #34d399; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        
        .chat-window { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: linear-gradient(to bottom, rgba(2,6,23,0.1), rgba(2,6,23,0.5)); padding-bottom: 100px; scroll-behavior: smooth; }
        .chat-window::-webkit-scrollbar { display: none; }
        
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-start; }
        .msg-row.user { margin-left: auto; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; font-weight: bold; }
        .msg-avatar.ai { background-color: #2563eb; }
        .msg-avatar.user { background-color: #4f46e5; }
        
        .msg-bubble { padding: 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-row.ai .msg-bubble { background-color: #1e293b; color: #f1f5f9; border-top-left-radius: 0; border: 1px solid rgba(255,255,255,0.05); }
        .msg-row.user .msg-bubble { background-color: #2563eb; color: white; border-top-right-radius: 0; }
        
        .wave-container { display: none; justify-content: center; align-items: center; gap: 6px; padding: 12px; background-color: rgba(2, 6, 23, 0.8); border-top: 1px solid #1e293b; position: absolute; bottom: 84px; width: 100%; backdrop-filter: blur(8px); }
        .wave-text { font-size: 12px; color: #60a5fa; font-weight: 500; margin-right: 8px; }
        .wave-bar { width: 4px; height: 24px; background-color: #3b82f6; border-radius: 9999px; animation: wave 1.2s ease-in-out infinite; transform-origin: center; }
        .wave-bar:nth-child(2) { background-color: #60a5fa; animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { background-color: #6366f1; animation-delay: 0.4s; }
        .wave-bar:nth-child(4) { background-color: #60a5fa; animation-delay: 0.6s; }
        .wave-bar:nth-child(5) { background-color: #3b82f6; animation-delay: 0.8s; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
        
        .controls { padding: 16px; background-color: rgba(15, 23, 42, 0.95); border-top: 1px solid #1e293b; backdrop-filter: blur(8px); position: absolute; bottom: 0; left: 0; right: 0; }
        .speak-btn { background: linear-gradient(to right, #2563eb, #4f46e5); color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .speak-btn:active { transform: scale(0.97); opacity: 0.9; }
        .speak-btn:disabled { opacity: 0.6; background: #334155; cursor: not-allowed; box-shadow: none; }
        
        .btn-action { background-color: rgba(30, 41, 59, 0.6); border: none; color: #94a3b8; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .install-btn { background-color: #2563eb; color: white; font-weight: bold; font-size: 12px; padding: 6px 12px; border-radius: 10px; display: none; margin-right: 8px; border: none; }
    </style>
</head>
<body>

    <div class="ai-container">
        <!-- హెడర్ -->
        <div class="header">
            <div class="profile-area">
                <div class="avatar">👩‍💻<span class="online-dot"></span></div>
                <div>
                    <div class="title">అక్షర AI</div>
                    <div class="status">యాప్ ఆన్‌లైన్</div>
                </div>
            </div>
            <div style="display: flex; align-items: center;">
                <button id="pwaInstallBtn" class="install-btn">ఇన్‌స్టాల్ యాప్</button>
                <button onclick="clearChat()" class="btn-action" title="చాట్ క్లియర్ చేయి">🗑️</button>
            </div>
        </div>

        <!-- చాట్ విండో -->
        <div id="chatWindow" class="chat-window">
            <div class="msg-row ai">
                <div class="msg-avatar ai">AI</div>
                <div class="msg-bubble">
                    నమస్కారం! నేను అక్షరని. మీ చదువులో సహాయం చేయడానికి సిద్ధంగా ఉన్నాను. కింద ఉన్న బటన్ నొక్కి నాతో మాట్లాడవచ్చు!
                </div>
            </div>
        </div>

        <!-- ఆడియో వేవ్ -->
        <div id="waveContainer" class="wave-container">
            <span id="statusText" class="wave-text">వింటున్నాను...</span>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <!-- కంట్రోల్స్ -->
        <div class="controls">
            <button id="speakBtn" class="speak-btn">
                <span>🎤 నాతో మాట్లాడు</span>
            </button>
        </div>
    </div>

    <script>
        // PWA ఇన్‌స్టాలేషన్
        let deferredPrompt;
        const pwaInstallBtn = document.getElementById('pwaInstallBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            pwaInstallBtn.style.display = 'block';
        });

        pwaInstallBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                pwaInstallBtn.style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // AI లాజిక్ మరియు మైక్ యాక్సెస్ ఫిక్స్
        const speakBtn = document.getElementById('speakBtn');
        const chatWindow = document.getElementById('chatWindow');
        const waveContainer = document.getElementById('waveContainer');
        const statusText = document.getElementById('statusText');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'te-IN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                showWave("మీ మాటలు వింటున్నాను...");
                speakBtn.disabled = true;
            };

            recognition.onerror = (event) => {
                hideWave();
                resetButton();
                if (event.error === 'not-allowed') {
                    addMessage("మైక్రోఫోన్ పర్మిషన్ నిరాకరించబడింది. దయచేసి బ్రౌజర్ సెట్టింగ్స్ లో మైక్ ఆన్ చేయండి.", "ai");
                } else {
                    addMessage("క్షమించండి, మీ వాయిస్ స్పష్టంగా వినపడలేదు. మళ్ళీ ప్రయత్నించండి.", "ai");
                }
            };

            recognition.onresult = (event) => {
                const userText = event.results.transcript;
                addMessage(userText, "user");
                generateAIResponse(userText);
